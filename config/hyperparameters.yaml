# All ML/DL hyperparameters are centralised here so the manuscript tables can be
# regenerated by re-running the pipeline.

# ---------------------------------------------------------------------------
# Random Forest (Google Earth Engine ee.Classifier.smileRandomForest)
# Used for Sentinel-2 land-cover classification (7 classes)
# ---------------------------------------------------------------------------
random_forest_lulc:
  n_trees: 500
  variables_per_split: sqrt        # = √n where n = predictors
  min_leaf_population: 5
  bag_fraction: 0.7
  out_of_bag_mode: false
  seed: 42
  feature_set:
    sentinel2_bands: [B2, B3, B4, B5, B6, B7, B8, B8A, B11, B12]
    spectral_indices: [NDVI, EVI, BSI, NDWI, SAVI, NDMI, MNDWI]
  training_per_class_min: 200
  validation:
    n_per_class: 100
    method: stratified_random
    seed: 7

# ---------------------------------------------------------------------------
# Random Forest regressor / classifier - sklearn (heavy-metal modelling)
# ---------------------------------------------------------------------------
random_forest_geochem:
  n_estimators: 500
  max_depth: null
  min_samples_split: 2
  min_samples_leaf: 1
  max_features: sqrt
  bootstrap: true
  oob_score: true
  random_state: 42
  n_jobs: -1

# ---------------------------------------------------------------------------
# XGBoost regressor (heavy-metal concentration prediction)
# ---------------------------------------------------------------------------
xgboost:
  n_estimators: 1000
  learning_rate: 0.05
  max_depth: 6
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  gamma: 0
  early_stopping_rounds: 50
  objective: reg:squarederror
  tree_method: hist
  random_state: 42

# ---------------------------------------------------------------------------
# LightGBM
# ---------------------------------------------------------------------------
lightgbm:
  n_estimators: 1000
  learning_rate: 0.05
  num_leaves: 31
  max_depth: -1
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  random_state: 42

# ---------------------------------------------------------------------------
# Support Vector Regression (geochemical interpolation)
# ---------------------------------------------------------------------------
svr:
  kernel: rbf
  C: 1.0
  epsilon: 0.1
  gamma: scale

# ---------------------------------------------------------------------------
# Gaussian Process Regression (kriging-equivalent ML)
# ---------------------------------------------------------------------------
gaussian_process:
  kernel: "C(1.0) * Matern(length_scale=1.0, nu=1.5) + WhiteKernel()"
  n_restarts_optimizer: 10
  alpha: 1.0e-6
  normalize_y: true
  random_state: 42

# ---------------------------------------------------------------------------
# Multilayer perceptron (Keras) for heavy-metal regression
# ---------------------------------------------------------------------------
ann:
  hidden_layers: [128, 64, 32]
  activation: relu
  output_activation: linear
  optimizer: adam
  learning_rate: 0.001
  loss: mean_squared_error
  metrics: [mean_absolute_error, root_mean_squared_error]
  batch_size: 32
  epochs: 200
  early_stopping_patience: 25
  validation_split: 0.2
  dropout_rate: 0.2
  l2_regularisation: 1.0e-4
  random_state: 42

# ---------------------------------------------------------------------------
# Stacking ensemble (RF + XGB + LGBM -> Ridge meta-learner)
# ---------------------------------------------------------------------------
stacking:
  base_models: [random_forest_geochem, xgboost, lightgbm, svr]
  meta_learner: ridge
  meta_learner_alpha: 1.0
  cv_folds: 5
  passthrough: false

# ---------------------------------------------------------------------------
# MaxEnt species distribution
# ---------------------------------------------------------------------------
maxent:
  feature_classes: [linear, quadratic, hinge]
  regularisation_multiplier: 1.0
  max_iterations: 5000
  convergence_threshold: 1.0e-5
  background_points: 10000
  replicates: 10
  replicate_type: bootstrap
  test_split_fraction: 0.25
  threshold_rule: equal_training_sensitivity_specificity
  multicollinearity_pearson_max: 0.8
  evaluation:
    auc_min: 0.7
    tss_min: 0.4
    suitability_threshold: 0.6

# ---------------------------------------------------------------------------
# Spatial autocorrelation
# ---------------------------------------------------------------------------
spatial_autocorrelation:
  permutations: 999
  weights:
    polygons: queen
    points:
      method: distance_band
      threshold_km: 5.0
      binary: true
  significance_level: 0.05

# ---------------------------------------------------------------------------
# Logistic regression for DHS proximity analysis
# ---------------------------------------------------------------------------
dhs_logistic:
  covariates: [age, household_education_years, wealth_quintile]
  reference_proximity_class: distal
  significance_level: 0.05
  outcomes:
    - acute_respiratory_infection
    - diarrhoeal_disease
    - anaemia_women
    - child_stunting
    - child_wasting
